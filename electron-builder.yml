appId: app.treemonk.desktop
productName: TreeMonk
# Where the in-app updater looks for new releases. It creates a DRAFT release per
# tag (v<version>); CI uploads the Windows .exe and Linux .AppImage to it, then
# the release is published with the localized notes (see .github/workflows).
publish:
  provider: github
  owner: n1kozor
  repo: Tree-Monk
directories:
  output: release
  buildResources: build
# Ad-hoc code-sign the macOS app so Apple Silicon doesn't report it as "damaged"
# (an unsigned arm64 binary is rejected outright). See scripts/afterPack.cjs.
afterPack: scripts/afterPack.cjs
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintrc,.prettierrc,tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - '**/*.node'
  - 'node_modules/better-sqlite3/**'
extraResources:
  # needs to `pip install` anything.
  # App icon for the runtime window/taskbar.
  - from: build/icon.png
    to: icon.png
  # Hungarian user manual (self-contained HTML) — opened in an in-app window
  # from the sidebar / Help.
  - from: docs/TreeMonk-Kezikonyv.html
    to: manual.html
linux:
  target:
    - AppImage
    - deb
  category: Office
  maintainer: TreeMonk
  # Without an explicit icon, electron-builder doesn't install a menu/taskbar icon
  # on Linux (it expects build/icons/ otherwise). A single 512×512 PNG is enough —
  # it generates the hicolor sizes and the .desktop Icon entry from it.
  icon: build/icon.png
  synopsis: Local-first genealogy and historical research workbench
  desktop:
    # Matches Electron's WM_CLASS so the running window picks up the same icon.
    StartupWMClass: TreeMonk
win:
  icon: build/icon.ico
  target:
    - nsis
# Installer EULA (shown on the NSIS license page). Given EXPLICITLY as one
# combined file — NOT the auto-detected `build/license_<lang>.txt` convention,
# because those files are ALSO picked up by the macOS DMG license builder, whose
# legacy Mac-charset encoder chokes on typographic punctuation (— „ " → ©). One
# nsis.license keeps the Windows EULA while leaving the DMG license-free.
nsis:
  license: build/eula.txt
# Microsoft Store (MSIX/AppX) package — built ONLY via `npm run dist:win:store`,
# never by the normal release flow. The Store signs the package itself, so no
# certificate is needed. The identity values below are PLACEHOLDERS: pass the
# real ones from Partner Center → Product identity at build time, e.g.
#   npm run dist:win:store -- \
#     -c.appx.identityName=XXXXX.TreeMonk \
#     -c.appx.publisher="CN=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" \
#     -c.appx.publisherDisplayName="Attila Barkóczi"
appx:
  identityName: PLACEHOLDER.TreeMonk
  publisher: CN=00000000-0000-0000-0000-000000000000
  publisherDisplayName: Attila Barkóczi
  applicationId: TreeMonk
  displayName: TreeMonk
  backgroundColor: '#0f766e'
  languages:
    - en-US
    - hu-HU
    - de-DE
mac:
  target:
    - dmg
  category: public.app-category.productivity
  # No Apple Developer ID yet → ship an UNSIGNED build (users right-click → Open
  # once to bypass Gatekeeper). `identity: null` skips code signing cleanly so
  # the CI build never fails for a missing certificate.
  identity: null
npmRebuild: true
