name: Store package

# Builds the Microsoft Store (MSIX/AppX) package on demand. AppX can only be
# built on Windows, hence the CI runner. The package is NOT published anywhere:
# it lands as a workflow artifact, to be uploaded manually in Partner Center
# (the Store signs it during ingestion — no certificate involved).
#
# The package identity comes from the STORE_IDENTITY_NAME / STORE_PUBLISHER /
# STORE_PUBLISHER_DISPLAY repository secrets (Partner Center → Product
# identity), so the values never appear in the repo or in build logs.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  appx:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build MSIX (AppX) package
        shell: bash
        run: |
          npm run dist:win:store -- \
            -c.appx.identityName="${{ secrets.STORE_IDENTITY_NAME }}" \
            -c.appx.publisher="${{ secrets.STORE_PUBLISHER }}" \
            -c.appx.publisherDisplayName="${{ secrets.STORE_PUBLISHER_DISPLAY }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: TreeMonk-store-appx
          path: release/*.appx
          if-no-files-found: error
